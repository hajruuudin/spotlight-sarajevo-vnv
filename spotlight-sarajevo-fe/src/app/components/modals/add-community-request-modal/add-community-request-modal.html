<div
  class="w-5/6 md:w-2/3 lg:w-1/2 max-h-[90vh] dark:bg-(--background-200) bg-white rounded-xl p-6 flex flex-col justify-between items-center overflow-hidden"
>
  <!-- Header -->
  <header class="w-full h-auto text-center font-bold text-xl md:text-2xl">
    {{ 'communityRequest.modalTitle' | transloco }}
  </header>

  <div class="w-full h-0.5 rounded-full dark:bg-white bg-black mt-2"></div>

  <!-- Content -->
  <content class="w-full flex-1 overflow-y-auto pt-4 pb-4">
    <form [formGroup]="mainForm" class="w-full flex flex-col justify-start items-stretch gap-4">
      
      <!-- Request Type Selector -->
      <div class="w-full flex flex-col gap-1">
        <label class="text-sm font-semibold">{{ 'communityRequest.requestType' | transloco }} *</label>
        <app-select-group
          [options]="REQUEST_TYPE_OPTIONS"
          [placeholder]="'communityRequest.requestType' | transloco"
          formControlName="requestType"
        ></app-select-group>
      </div>

      <!-- Object Type Selector -->
      <div class="w-full flex flex-col gap-1">
        <label class="text-sm font-semibold">{{ 'communityRequest.objectType' | transloco }} *</label>
        <app-select-group
          [options]="OBJECT_TYPE_OPTIONS"
          [placeholder]="'communityRequest.objectType' | transloco"
          formControlName="objectType"
        ></app-select-group>
      </div>

      <!-- Request Header -->
      <div class="w-full flex flex-col gap-1">
        <label class="text-sm font-semibold">{{ 'communityRequest.requestHeader' | transloco }} *</label>
        <app-text-input
          [classAddons]="'w-full'"
          [id]="'requestHeaderInput'"
          [type]="'text'"
          [placeholder]="'communityRequest.requestHeaderPlaceholder' | transloco"
          formControlName="requestHeader"
        ></app-text-input>
      </div>

      <!-- Request Description -->
      <div class="w-full flex flex-col gap-1">
        <label class="text-sm font-semibold">{{ 'communityRequest.requestDescription' | transloco }} *</label>
        <app-text-area
          [classAddons]="'w-full h-24'"
          [id]="'requestDescriptionInput'"
          [placeholder]="'communityRequest.requestDescriptionPlaceholder' | transloco"
          formControlName="requestDescription"
        ></app-text-area>
      </div>
    </form>

    <!-- Spot Details Form (shown when ADD + SPOT) -->
    @if (showSpotDetails) {
      <div class="w-full mt-6 p-4 rounded-xl dark:bg-(--background-100) bg-(--background-700)">
        <h4 class="text-base font-bold mb-3">{{ 'communityRequest.spotDetailsTitle' | transloco }}</h4>
        <form [formGroup]="spotForm" class="w-full flex flex-col gap-3">
          <div class="w-full flex flex-col gap-1">
            <label class="text-sm font-semibold">{{ 'communityRequest.spotName' | transloco }} *</label>
            <app-text-input
              [classAddons]="'w-full'"
              [id]="'spotNameInput'"
              [type]="'text'"
              [placeholder]="'communityRequest.spotNamePlaceholder' | transloco"
              formControlName="spotName"
            ></app-text-input>
          </div>

          <div class="w-full flex flex-col gap-1">
            <label class="text-sm font-semibold">{{ 'communityRequest.spotAddress' | transloco }}</label>
            <app-text-input
              [classAddons]="'w-full'"
              [id]="'spotAddressInput'"
              [type]="'text'"
              [placeholder]="'communityRequest.spotAddressPlaceholder' | transloco"
              formControlName="spotAddress"
            ></app-text-input>
          </div>

          <div class="w-full flex flex-col gap-1">
            <label class="text-sm font-semibold">{{ 'communityRequest.spotDescription' | transloco }}</label>
            <app-text-area
              [classAddons]="'w-full h-20'"
              [id]="'spotDescriptionInput'"
              [placeholder]="'communityRequest.spotDescriptionPlaceholder' | transloco"
              formControlName="spotDescription"
            ></app-text-area>
          </div>

          <div class="w-full flex flex-col gap-1">
            <label class="text-sm font-semibold">{{ 'communityRequest.spotCategory' | transloco }}</label>
            <app-text-input
              [classAddons]="'w-full'"
              [id]="'spotCategoryInput'"
              [type]="'text'"
              [placeholder]="'e.g. Restaurant, Cafe, Museum...'"
              formControlName="spotCategory"
            ></app-text-input>
          </div>
        </form>
      </div>
    }

    <!-- Event Details Form (shown when ADD + EVENT) -->
    @if (showEventDetails) {
      <div class="w-full mt-6 p-4 rounded-xl dark:bg-(--background-300) bg-(--background-800)">
        <h4 class="text-base font-bold mb-3">{{ 'communityRequest.eventDetailsTitle' | transloco }}</h4>
        <form [formGroup]="eventForm" class="w-full flex flex-col gap-3">
          <div class="w-full flex flex-col gap-1">
            <label class="text-sm font-semibold">{{ 'communityRequest.eventName' | transloco }} *</label>
            <app-text-input
              [classAddons]="'w-full'"
              [id]="'eventNameInput'"
              [type]="'text'"
              [placeholder]="'communityRequest.eventNamePlaceholder' | transloco"
              formControlName="eventName"
            ></app-text-input>
          </div>

          <div class="w-full flex flex-col gap-1">
            <label class="text-sm font-semibold">{{ 'communityRequest.eventLocation' | transloco }}</label>
            <app-text-input
              [classAddons]="'w-full'"
              [id]="'eventLocationInput'"
              [type]="'text'"
              [placeholder]="'communityRequest.eventLocationPlaceholder' | transloco"
              formControlName="eventLocation"
            ></app-text-input>
          </div>

          <div class="w-full flex flex-col gap-1">
            <label class="text-sm font-semibold">{{ 'communityRequest.eventDescription' | transloco }}</label>
            <app-text-area
              [classAddons]="'w-full h-20'"
              [id]="'eventDescriptionInput'"
              [placeholder]="'communityRequest.eventDescriptionPlaceholder' | transloco"
              formControlName="eventDescription"
            ></app-text-area>
          </div>

          <div class="w-full flex flex-col gap-1">
            <label class="text-sm font-semibold">{{ 'communityRequest.eventDate' | transloco }}</label>
            <app-text-input
              [classAddons]="'w-full'"
              [id]="'eventDateInput'"
              [type]="'date'"
              [placeholder]="''"
              formControlName="eventDate"
            ></app-text-input>
          </div>
        </form>
      </div>
    }
  </content>

  <!-- Footer -->
  <footer class="w-full h-auto flex flex-row justify-center items-center gap-4 pt-4">
    <app-button-primary
      (click)="onFormSubmit()"
      [buttonType]="'DEFAULT'"
      [buttonContent]="'communityRequest.modalSubmit' | transloco"
      [classAddons]="'w-full px-6'"
      class="w-full"
    ></app-button-primary>
    <app-button-primary
      (click)="onClose()"
      [buttonType]="'DANGER'"
      [buttonContent]="'communityRequest.modalCancel' | transloco"
      [classAddons]="'w-full px-6'"
      class="w-full"
    ></app-button-primary>
  </footer>
</div>
