<div
  animate.enter="fade-in-animation"
  animate.exit="fade-out-animation"
  class="w-5/6 md:w-1/2 h-auto dark:bg-(--background-200) bg-white rounded-xl p-6 flex flex-col justify-between items-center"
>
  <header class="w-full h-auto text-center font-bold text-xl md:text-2xl">{{ (this.reviewType ? 'spotReview.delete' : 'eventReview.delete') | transloco }}</header>

  <div class="w-full h-0.5 rounded-full dark:bg-white bg-black mt-2"></div>

  <content class="w-full h-auto overflow-y-scroll p-4">
    <span class="text-base md:text-lg">{{( this.reviewType ? 'spotReview.deleteConfirm' : 'eventReview.deleteConfirm' ) | transloco }}</span>
  </content>

  <footer class="w-full h-auto flex flex-row justify-center items-center gap-4">
    <app-button-primary
      (click)="this.confirm()"
      [buttonType]="'DEFAULT'"
      [buttonContent]="(this.reviewType ? 'spotReview.deleteConfirmMessage' : 'eventReview.deleteConfirmMessage') | transloco"
      [classAddons]="'w-full'"
      class="w-full" 
    ></app-button-primary>
    <app-button-primary
      (click)="this.cancel()"
      [buttonType]="'DANGER'"
      [buttonContent]="(this.reviewType ? 'spotReview.cancel' : 'eventReview.cancel') | transloco"
      [classAddons]="'w-full'"
      class="w-full" 
    ></app-button-primary>
  </footer>
</div>
