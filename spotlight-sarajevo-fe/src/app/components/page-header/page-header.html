<h1 id="pageTitle" [class]="'font-bold text-3xl md:text-4xl tracking-wide' + this.themeColors">{{ this.title }}</h1>
<div
  [class]="'w-1/4 h-1 rounded-full origin-center animate-[expand_0.3s_ease-out_forwards] ' + this.dividerColor"
></div>
<span id="subtitle" [class]="'font-light text-base md:text-xl tracking-normal' + this.themeColors">{{
  this.subtitle
}}</span>
