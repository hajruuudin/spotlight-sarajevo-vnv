<div
  [style.backgroundImage]="this.spot.thumbnailImage ? 'url(' + this.spot.thumbnailImage.imageUrl + ')' : ''"
  style="background-position: center; background-size: cover"
  class="dark:bg-black text-white bg-(--primary-200) relative rounded-2xl outline-2 dark:outline-(--primary-200) outline-(--primary-700) hover:outline-2 hover:dark:outline-(--primary-500) hover:outline-(--primary-100) h-48 w-72 md:w-96 flex flex-row justify-between items-center group transition-all"
>
  <div
    class="w-4/5 group-hover:w-full absolute rounded-l-2xl h-full bg-gradient-to-r dark:from-black from-(--primary-200) dark:via-black/80 via-(--primary-200)/80 to-transparent inset-0 transition-all"
  ></div>
  <div class="w-1/2 h-full flex flex-col justify-center items-center space-y-2 m-4 z-20">
    <span class="text-2xl font-semibold">{{ this.lang == 'en' ? spot.officialNameEn : this.spot.officialNameBs }}</span>
    <p class="text-base font-normal">
      {{ this.lang == 'en' ? spot.smallDescriptionEn : this.spot.smallDescriptionBs }}
    </p>
  </div>
</div>
