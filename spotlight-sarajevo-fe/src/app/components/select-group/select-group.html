<div class="relative w-full">
  <div
    class="hover:outline-2 outline-(--primary-300) dark:bg-(--secondary-400) bg-(--background-900) rounded-2xl px-4 py-2 font-bold cursor-pointer flex justify-between items-center"
    [class.opacity-50]="disabled"
    (click)="toggleDropdown()"
  >
    <span>{{ selectedLabel }}</span>
    <span class="arrow">{{ isOpen ? '▲' : '▼' }}</span>
  </div>

  @if (this.isOpen) {
  <ul
    class="absolute w-full mt-1 border-4 border-(--primary-700) rounded-2xl dark:bg-(--primary-200) bg-(--background-900) shadow-lg z-10 max-h-60 overflow-auto"
  >
    @for (option of this.options; track $index) {
    <li
      (click)="selectOption(option)"
      [class.bg-(--primary-300)]="isSelected(option)"
      class="p-2 cursor-pointer hover:bg-(--accent-300) font-bold"
    >
      {{ option.label }}
    </li>
    }
  </ul>
  }
</div>
