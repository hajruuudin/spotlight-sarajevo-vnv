<div
  [class]="'relative flex items-center ' + (this.style === 'ADMIN' ? 'w-full rounded-full bg-(--secondary-600) dark:bg-(--background-200)' : 'w-full rounded-2xl bg-(--secondary-600) dark:bg-(--background-200)')"
>
  <input
    type="text"
    [value]="value"
    (input)="onInput($event)"
    [placeholder]="placeholder"
    [class]="'w-full font-semibold focus:outline-2 focus:ring-0 focus:outline-[var(--primary-400)] ' + (this.style === 'ADMIN' ? 'py-4 px-3 text-sm rounded-full' : 'py-2 md:py-6 px-4 text-xl md:text-2xl rounded-2xl')"
  />
  <button
    type="button"
    (click)="onSearchPressed()"
    [class]="'absolute right-0 h-full flex items-center justify-center transition-all ' + (this.style === 'ADMIN' ? 'w-24 rounded-full bg-(--secondary-700) dark:bg-[var(--background-300)] hover:dark:bg-[var(--background-400)]' : 'w-1/4 rounded-2xl bg-(--secondary-700) dark:bg-[var(--background-300)] hover:dark:bg-[var(--background-400)]')"
  >
    <app-search-icon></app-search-icon>
    <span [class]="'font-bold ' + (this.style === 'ADMIN' ? 'hidden' : 'hidden md:inline text-xl md:text-2xl')">{{
      'search.searchButton' | transloco
    }}</span>
  </button>
</div>
