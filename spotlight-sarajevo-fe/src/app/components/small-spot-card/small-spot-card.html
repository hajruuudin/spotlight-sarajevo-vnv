<div
  class="h-72 w-48 md:w-56 lg:w-64 dark:bg-(--secondary-200) bg-(--secondary-500) rounded-2xl outline-2 dark:outline-(--primary-200) outline-(--primary-700) hover:outline-2 hover:dark:outline-(--primary-500) hover:outline-(--primary-100) flex flex-col justify-center items-center transition-all overflow-hidden hover:scale-105 hover:mx-2"
>
  <!-- IMAGE CONATINER WITH BACKGROUND -->
  <div
    class="h-2/3 w-full flex flex-col justify-end items-center rounded-t-2xl"
    style="background-size: cover; transform: scale(1); box-shadow: 0px 0px 10px black inset"
    [style.backgroundImage]="
      this.spot.thumbnailImage ? 'url(' + this.spot.thumbnailImage.imageUrl + ')' : ''
    "
  >
    <div
      class="rounded-t-2xl dark:bg-(--secondary-400) bg-(--secondary-800) text-center px-2 w-auto font-semibold"
    >
      <span>{{ this.lang == 'en' ? this.spot.officialNameEn : this.spot.officialNameBs }}</span>
    </div>
  </div>

  <!-- INFORMATION CONTAINER -->
  <div
    class="flex flex-col dark:bg-(--background-200) bg-(--secondary-500) justify-between items-center w-full h-1/3 px-2 z-10"
  >
    <span class="text-base mt-2">{{
      this.lang == 'en' ? this.spot.smallDescriptionEn : this.spot.smallDescriptionBs
    }}</span>
    <div
      class="w-auto h-auto dark:bg-(--secondary-400) bg-(--secondary-800) rounded-t-2xl px-4 py-1 font-bold"
    >
      {{ this.lang == 'en' ? this.spot.categoryNameEn : this.spot.categoryNameBs }}
    </div>
  </div>
</div>
