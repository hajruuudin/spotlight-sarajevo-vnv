<div
  class="group dark:bg-(--background-50) bg-(--background-900) relative w-full h-56 flex flex-col items-center justify-center overflow-hidden rounded-2xl cursor-pointer border-2 border-transparent transition-all duration-300 dark:border-(--primary-300) dark:hover:border-(--primary-500) hover:border-(--primary-200) hover:p-4"
>
  <div
    class="absolute inset-0 z-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-105"
    [style.backgroundImage]="'url(' + (guide.thumbnailImage ? guide.thumbnailImage.imageUrl : '') + ')'"
    style="opacity: 0.5"
  ></div>

  <div class="relative z-10 flex flex-col items-center text-center px-6 w-full">
    <span class="text-xs md:text-sm font-bold tracking-widest uppercase mb-1">
      {{ lang === 'en' ? guide.categoryNameEn : guide.categoryNameBs }}
    </span>

    <h3 class="text-2xl md:text-3xl font-black leading-tight">
      {{ lang === 'en' ? guide.guideTitleEn : guide.guideTitleBs }}
    </h3>

    <div class="w-16 h-1 dark:bg-white bg-black my-2 rounded-full"></div>

    <p class="text-sm md:text-base max-w-md line-clamp-3">
      {{ lang === 'en' ? guide.guideSmallDescriptionEn : guide.guideSmallDescriptionBs }}
    </p>
  </div>

  <div
    class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"
  ></div>
</div>
