<div
  (click)="this.onMethodSelect(this.sortingMethod)"
  [ngClass]="
    this.isSelected
      ? 'w-full py-4 dark:bg-(--accent-400) bg-(--accent-700) rounded-2xl font-bold'
      : 'w-full py-4 dark:bg-(--background-300) bg-(--background-800) rounded-2xl font-bold'
  "
>
  {{ this.sortingMethod }}
</div>
