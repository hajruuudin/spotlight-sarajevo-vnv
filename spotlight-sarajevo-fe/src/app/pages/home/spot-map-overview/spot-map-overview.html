<!-- Fullscreen Map -->
<app-map-fullscreen
  class="absolute inset-0 z-0"
  [layoutMode]="this.session.theme()"
  [spots]="this.spotMapPins"
  [lang]="this.session.language()"
></app-map-fullscreen>

<!-- Floating Search & Filter Panel -->
<div
  class="absolute bottom-6 left-1/2 -translate-x-1/2 z-[400] w-[92%] md:w-[600px] flex flex-col items-center space-y-3"
>
  <!-- Search Bar -->
  <form
    [formGroup]="searchForm"
    class="w-full"
  >
    <app-search-bar
      formControlName="searchTerm"
      [placeholder]="'spotMap.searchPlaceholder' | transloco"
      (search)="onSearchTriggered()"
    ></app-search-bar>
  </form>

  <!-- Filter Toggle + Category Pills -->
  <div class="w-full flex flex-col items-center space-y-2">
    <button
      (click)="toggleFilterPopup()"
      class="px-6 py-2 rounded-full font-bold text-sm md:text-base dark:bg-(--background-300) bg-(--secondary-600) hover:dark:bg-(--background-400) hover:bg-(--secondary-700) transition-all shadow-lg"
    >
      {{ 'spotMap.filterButton' | transloco }}
    </button>

    @if (this.isFilterPopupLoaded) {
      <div
        animate.enter="blink-in-animation"
        animate.leave="blink-out-animation"
        style="box-shadow: 0px 0px 20px #00000055"
        class="w-full max-h-64 overflow-y-auto rounded-2xl dark:bg-(--background-400) bg-(--background-900) p-4 flex flex-col space-y-3"
      >
        <div class="flex flex-row flex-wrap justify-center gap-2">
          @for (category of this.spotCategories; track $index) {
            <app-category-filter-selector
              [categoryName]="
                this.getCurrentLanguage() == 'en'
                  ? category.spotCategoryNameEn
                  : category.spotCategoryNameBs
              "
              [type]="'spot'"
              [isSelected]="this.selectedCategoryIds.indexOf(category.id) !== -1"
              (selectionChange)="onCategoryCheckboxChange(category.id)"
            ></app-category-filter-selector>
          }
        </div>
        <app-button-secondary
          (click)="this.resetCategoryFilters()"
          [buttonContent]="'search.searchReset' | transloco"
          [classAddons]="'px-6'"
        ></app-button-secondary>
      </div>
    }
  </div>

  <!-- Loading Indicator -->
  <app-spinner-small-component
    [visible]="this.isSectionLoading()"
    message="Loading spots..."
  ></app-spinner-small-component>
</div>
