<div class="flex flex-row justify-center items-center py-16">
    <section class="flex flex-col justify-center items-center md:items-start">
        <h1 class="text-2xl md:text-4xl font-bold my-2">
            {{ 'premiumBenefits.title' | transloco }}
        </h1>
        <span class="text-lg md:text-2xl text-center md:text-start">
            {{ 'premiumBenefits.subtitle' | transloco }}
        </span>
        <ul class="w-full flex flex-col justify-center items-center md:items-start space-y-2 py-4">
            <li class="text-base md:text-xl dark:bg-(--background-200) bg-(--background-700) rounded-2xl py-1 px-2">
                {{ 'premiumBenefits.benefitOne' | transloco }}
            </li>
            <li class="text-base md:text-xl dark:bg-(--background-200) bg-(--background-700) rounded-2xl py-1 px-2">
                {{ 'premiumBenefits.benefitTwo' | transloco }}
            </li>
            <li class="text-base md:text-xl dark:bg-(--background-200) bg-(--background-700) rounded-2xl py-1 px-2">
                {{ 'premiumBenefits.benefitThree' | transloco }}
            </li>
            <li class="text-base md:text-xl dark:bg-(--background-200) bg-(--background-700) rounded-2xl py-1 px-2">
                {{ 'premiumBenefits.benefitFour' | transloco }}
            </li>
        </ul>

        <app-button-primary 
            (pressed)="this.navigateToProfile()" 
            [classAddons]="'px-6 mt-10'" 
            [buttonContent]="'premiumBenefits.upgradeButton' | transloco" 
            [buttonType]="'DEFAULT'">
        </app-button-primary>
    </section>
</div>
